<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>soundcode808</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600&family=Noto+Sans+KR:wght@300;400;500&family=Space+Mono:wght@400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── THEMES ──────────────────────────────── */
    body.t-minimal {
      --bg:#fafafa; --surface:#fff; --text:#1c1c1e; --text-sub:#6e6e73;
      --text-muted:#b0b0b5; --border:#e8e8ec; --hbg:rgba(250,250,250,0.88);
    }
    body.t-night {
      --bg:#0f0e0c; --surface:#181714; --text:#e8d8b8; --text-sub:#a09070;
      --text-muted:#5a4e3a; --border:#2a2520; --hbg:rgba(15,14,12,0.94);
    }
    body.t-sepia {
      --bg:#f2ead8; --surface:#faf4e8; --text:#3c2f1e; --text-sub:#7a6248;
      --text-muted:#b09a7e; --border:#ddd0bc; --hbg:rgba(242,234,216,0.94);
    }
    body.t-void {
      --bg:#07080f; --surface:#0d0e1c; --text:#c8dcf0; --text-sub:#5a7a9a;
      --text-muted:#2a3a55; --border:#1a2240; --hbg:rgba(7,8,15,0.95);
    }

    html { font-size: 16px; }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    a { text-decoration: none; color: inherit; }

    /* ── CANVAS BG ─────────────────────────── */
    #bg-canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
    }

    /* ── LAYOUT WRAPPER ────────────────────── */
    .page-wrap {
      position: relative;
      z-index: 1;
    }

    /* ── HEADER ────────────────────────────── */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--hbg);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .brand-block {
      display: flex;
      flex-direction: column;
      gap: .2rem;
      justify-content: center;
    }

    .site-name {
      font-family: 'Space Mono', monospace;
      font-size: 0.82rem;
      letter-spacing: 0.04em;
      color: var(--text);
    }

    /* SNS 아이콘 */
    .sns-icons {
      display: flex;
      align-items: center;
      gap: .25rem;
    }
    .sns-link {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 20px;
      height: 20px;
      border-radius: 3px;
      color: var(--text-muted);
      opacity: .6;
      transition: opacity .2s, color .2s;
    }
    .sns-link:hover { opacity: 1; color: var(--text); }
    .sns-link svg { width: 11px; height: 11px; fill: currentColor; }

    .h-right {
      display: flex;
      align-items: center;
      gap: .9rem;
    }

    /* 테마 동그라미 */
    .theme-btns {
      display: flex;
      gap: .3rem;
      align-items: center;
    }
    .tbtn {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      border: 1.5px solid transparent;
      cursor: pointer;
      transition: border-color .2s, transform .15s;
      outline: 1px solid rgba(0,0,0,0.12);
      outline-offset: 0px;
    }
    .tbtn:hover { transform: scale(1.25); }
    .tbtn.on { border-color: var(--text); outline-color: transparent; }
    .tbtn-minimal { background: #fafafa; }
    .tbtn-night   { background: #0f0e0c; outline-color: rgba(255,255,255,0.15); }
    .tbtn-sepia   { background: #d4b896; outline-color: rgba(0,0,0,0.15); }
    .tbtn-void    { background: linear-gradient(135deg,#07080f 50%,#1a2240); outline-color: rgba(94,200,232,0.2); }

    .header-nav {
      display: flex;
      align-items: center;
    }
    .header-nav a {
      font-size: 0.75rem;
      color: var(--text-muted);
      letter-spacing: 0.05em;
      transition: color 0.2s;
    }
    .header-nav a:hover { color: var(--text); }

    /* ── HERO ──────────────────────────────── */
    .hero {
      max-width: 720px;
      margin: 0 auto;
      padding: 7rem 2rem 4.5rem;
    }

    .hero-label {
      font-family: 'Space Mono', monospace;
      font-size: 0.68rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 1.4rem;
    }

    .hero-title {
      font-family: 'Noto Serif KR', serif;
      font-size: clamp(2rem, 5vw, 3rem);
      font-weight: 300;
      line-height: 1.3;
      color: var(--text);
      margin-bottom: 1.2rem;
    }

    .hero-desc {
      font-size: 0.88rem;
      color: var(--text-sub);
      line-height: 1.9;
      max-width: 460px;
    }

    /* ── WORKS ─────────────────────────────── */
    .works-section {
      max-width: 720px;
      margin: 0 auto;
      padding: 0 2rem 8rem;
    }

    .section-rule {
      border: none;
      border-top: 1px solid var(--border);
      margin-bottom: 2.5rem;
    }

    .works-count {
      font-family: 'Space Mono', monospace;
      font-size: 0.68rem;
      color: var(--text-muted);
      letter-spacing: 0.1em;
      margin-bottom: 2rem;
    }

    /* ── CARD ──────────────────────────────── */
    .card-list {
      display: flex;
      flex-direction: column;
    }

    .card {
      display: grid;
      grid-template-columns: 2.5rem 1fr auto;
      align-items: start;
      gap: 1.2rem;
      padding: 1.8rem 0;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: opacity 0.2s;
      background: transparent;
    }
    .card:first-child { border-top: 1px solid var(--border); }
    .card:hover { opacity: 0.6; }

    .card-num {
      font-family: 'Space Mono', monospace;
      font-size: 0.68rem;
      color: var(--text-muted);
      padding-top: 0.25rem;
    }

    .card-meta {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      margin-bottom: 0.45rem;
    }

    .card-theme-badge {
      font-family: 'Space Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 0.15em 0.55em;
      border: 1px solid #ddd;
      color: var(--text-muted);
      border-radius: 2px;
    }

    .card-date {
      font-family: 'Space Mono', monospace;
      font-size: 0.65rem;
      color: var(--text-muted);
    }

    .card-title {
      font-family: 'Noto Serif KR', serif;
      font-size: 1.15rem;
      font-weight: 400;
      color: var(--text);
      margin-bottom: 0.3rem;
      line-height: 1.4;
    }

    .card-subtitle {
      font-size: 0.76rem;
      color: var(--text-muted);
      margin-bottom: 0.6rem;
    }

    .card-excerpt {
      font-size: 0.83rem;
      color: var(--text-sub);
      line-height: 1.75;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card-arrow {
      font-size: 0.9rem;
      color: var(--text-muted);
      padding-top: 0.25rem;
      transition: transform 0.2s, color 0.2s;
    }
    .card:hover .card-arrow { transform: translateX(4px); color: var(--text); }

    /* ── EMPTY ─────────────────────────────── */
    .empty-state {
      text-align: center;
      padding: 4rem 0;
      color: var(--text-muted);
      font-size: 0.83rem;
      line-height: 2;
    }

    /* ── FOOTER ────────────────────────────── */
    footer {
      border-top: 1px solid var(--border);
      padding: 2rem;
      text-align: center;
    }

    .footer-inner {
      font-family: 'Space Mono', monospace;
      font-size: 0.65rem;
      color: var(--text-muted);
      letter-spacing: 0.12em;
    }

    /* ── 기본 body 변수 (JS 로드 전 flicker 방지) ── */
    body { background: var(--bg); color: var(--text); }

    @media(max-width:600px){
      header { padding: 0 1rem; height: 52px; }
      .hero { padding: 4.5rem 1.2rem 3rem; }
      .works-section { padding: 0 1.2rem 5rem; }
      .hero-title { font-size: 1.7rem; }
      .tbtn { width: 13px; height: 13px; }
      .card { grid-template-columns: 2rem 1fr auto; gap: .8rem; padding: 1.4rem 0; }
    }
  </style>
</head>

  <script>
    /* ═══════════════════════════════════════════
       배경 — 오로라 앰비언트
       대형 그라디언트 풀 5개가 사인파 궤도로 천천히 유영
       개별 "물체" 없음 — 빛 자체가 살아있는 느낌
       마우스: 전체 배경이 미세하게 패럴랙스
    ═══════════════════════════════════════════ */
    (function () {
      const canvas = document.getElementById('bg-canvas');
      const ctx    = canvas.getContext('2d');
      let W, H;

      /* 마우스 패럴랙스 */
      const mouse  = { x: 0, y: 0 };
      const offset = { x: 0, y: 0 };

      function resize() {
        W = canvas.width  = window.innerWidth;
        H = canvas.height = window.innerHeight;
      }

      /* 테마별 색상 */
      function tone() {
        const b = document.body;
        if (b.classList.contains('t-void'))  return '60,115,195';
        if (b.classList.contains('t-night')) return '195,172,140';
        if (b.classList.contains('t-sepia')) return '158,118,72';
        return '95,95,95';
      }

      /* 풀 정의: [xRatio, yRatio, rRatio, ph1, ph2, f1, f2, axR, ayR] */
      const POOLS = [
        [0.28, 0.20, 0.58, 0.00, 2.10, 9e-5, 7e-5, 0.22, 0.17],
        [0.78, 0.68, 0.50, 1.55, 0.65, 7e-5, 1.1e-4, 0.17, 0.21],
        [0.52, 0.90, 0.44, 3.00, 4.20, 1.1e-4, 8e-5, 0.14, 0.13],
        [0.12, 0.72, 0.42, 4.50, 1.80, 8e-5, 1.0e-4, 0.19, 0.15],
        [0.88, 0.18, 0.40, 2.30, 3.50, 1.0e-4, 6.5e-5, 0.15, 0.19],
      ];

      function step() {
        ctx.clearRect(0, 0, W, H);
        const t = Date.now();
        const c = tone();

        /* 패럴랙스 스무딩 */
        offset.x += ((mouse.x - W / 2) * 0.028 - offset.x) * 0.018;
        offset.y += ((mouse.y - H / 2) * 0.022 - offset.y) * 0.018;

        const D = Math.min(W, H);

        POOLS.forEach(([xR, yR, rR, ph1, ph2, f1, f2, axR, ayR]) => {
          const x = W * xR + Math.sin(t * f1 + ph1) * W * axR + offset.x;
          const y = H * yR + Math.sin(t * f2 + ph2) * H * ayR + offset.y;
          const r = D * rR * (1 + Math.sin(t * 4.8e-5) * 0.07);

          const g = ctx.createRadialGradient(x, y, 0, x, y, r);
          g.addColorStop(0,    `rgba(${c},0.058)`);
          g.addColorStop(0.3,  `rgba(${c},0.034)`);
          g.addColorStop(0.65, `rgba(${c},0.012)`);
          g.addColorStop(1,    `rgba(${c},0)`);

          ctx.beginPath();
          ctx.arc(x, y, r, 0, Math.PI * 2);
          ctx.fillStyle = g;
          ctx.fill();
        });

        requestAnimationFrame(step);
      }

      window.addEventListener('resize', resize);
      window.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });
      window.addEventListener('touchmove',  e => {
        mouse.x = e.touches[0].clientX; mouse.y = e.touches[0].clientY;
      }, { passive: true });

      resize(); step();
    })();

    /* ═══════════════════════════════════════════
       테마 전환
    ═══════════════════════════════════════════ */
    const THEMES = ['minimal','night','sepia','void'];

    function setTheme(t) {
      THEMES.forEach(n => document.body.classList.remove('t-' + n));
      document.body.classList.add('t-' + t);
      localStorage.setItem('sc808_theme', t);
      document.querySelectorAll('.tbtn').forEach(b => {
        b.classList.toggle('on', b.classList.contains('tbtn-' + t));
      });
    }

    /* 저장된 테마 복원 */
    (function () {
      const saved = localStorage.getItem('sc808_theme');
      if (saved && THEMES.includes(saved)) setTheme(saved);
    })();

    /* ═══════════════════════════════════════════
       작품 렌더링
    ═══════════════════════════════════════════ */
    const THEME_LABELS = { minimal: 'Minimal', night: 'Night', sepia: 'Sepia', void: 'Void' };

    function render() {
      const list    = document.getElementById('card-list');
      const countEl = document.getElementById('works-count');

      if (!window.STORIES || window.STORIES.length === 0) {
        list.innerHTML = '<div class="empty-state">아직 올라온 작품이 없습니다.</div>';
        countEl.textContent = '0 works';
        return;
      }

      countEl.textContent = window.STORIES.length + ' works';

      list.innerHTML = window.STORIES.map((s, i) => `
        <article class="card" onclick="location.href='story.html?id=${s.id}'">
          <span class="card-num">${String(i + 1).padStart(2, '0')}</span>
          <div class="card-body">
            <div class="card-meta">
              <span class="card-theme-badge">${THEME_LABELS[s.theme] || s.theme}</span>
              ${s.date ? `<span class="card-date">${s.date}</span>` : ''}
            </div>
            <h2 class="card-title">${s.title}</h2>
            ${s.subtitle ? `<p class="card-subtitle">${s.subtitle}</p>` : ''}
            <p class="card-excerpt">${s.excerpt || ''}</p>
          </div>
          <span class="card-arrow">→</span>
        </article>
      `).join('');
    }

    render();
  </script>
</body>
</html>
