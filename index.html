<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>soundcode808</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600&family=Noto+Sans+KR:wght@300;400;500&family=Space+Mono:wght@400;700&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ══ THEMES ══════════════════════════════════════════ */
    body.t-minimal {
      --bg:#fafafa; --surface:#fff; --text:#1c1c1e; --text-sub:#6e6e73;
      --text-muted:#b0b0b5; --border:#e8e8ec; --accent:#1c1c1e;
      --hr-clr:#e0e0e5; --hbg:rgba(250,250,250,0.92);
      --font-body:'Noto Serif KR',serif; --font-ui:'Noto Sans KR',sans-serif;
      --font-mono:'Space Mono',monospace;
      --lh:2.05; --ls:0.01em; --rw:660px; --progress-clr:#1c1c1e;
    }
    body.t-night {
      --bg:#0f0e0c; --surface:#181714; --text:#e8d8b8; --text-sub:#a09070;
      --text-muted:#5a4e3a; --border:#2a2520; --accent:#e8d8b8;
      --hr-clr:#2e2820; --hbg:rgba(15,14,12,0.94);
      --font-body:'Noto Serif KR',serif; --font-ui:'Noto Sans KR',sans-serif;
      --font-mono:'Space Mono',monospace;
      --lh:2.2; --ls:0.015em; --rw:640px; --progress-clr:#e8d8b8;
    }
    body.t-sepia {
      --bg:#f2ead8; --surface:#faf4e8; --text:#3c2f1e; --text-sub:#7a6248;
      --text-muted:#b09a7e; --border:#ddd0bc; --accent:#3c2f1e;
      --hr-clr:#d0bfa8; --hbg:rgba(242,234,216,0.94);
      --font-body:'IM Fell English','Noto Serif KR',serif; --font-ui:'Noto Sans KR',sans-serif;
      --font-mono:'Space Mono',monospace;
      --lh:2.15; --ls:0.02em; --rw:620px; --progress-clr:#7a4020;
    }
    body.t-void {
      --bg:#07080f; --surface:#0d0e1c; --text:#c8dcf0; --text-sub:#5a7a9a;
      --text-muted:#2a3a55; --border:#1a2240; --accent:#5ec8e8;
      --hr-clr:#1e2a48; --hbg:rgba(7,8,15,0.95);
      --font-body:'Noto Sans KR',sans-serif; --font-ui:'Noto Sans KR',sans-serif;
      --font-mono:'Space Mono',monospace;
      --lh:2.0; --ls:0.03em; --rw:680px; --progress-clr:#5ec8e8;
    }

    html { font-size: 16px; }
    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh; overflow-x: hidden;
      transition: background .3s, color .3s;
    }
    a { text-decoration: none; color: inherit; }

    /* ══ SCROLL PROGRESS BAR ═══════════════════════════ */
    #progress-bar {
      position: fixed; top: 0; left: 0; z-index: 300;
      height: 2px; width: 0%;
      background: var(--progress-clr);
      transition: width .1s linear;
      opacity: 0; pointer-events: none;
    }
    #progress-bar.active { opacity: 1; }
    body.t-void #progress-bar {
      background: linear-gradient(90deg, #5ec8e8, #7c5cfc);
      box-shadow: 0 0 6px rgba(94,200,232,.4);
    }

    /* ══ VOID 별 ════════════════════════════════════════ */
    #void-bg {
      display: none; position: fixed; inset: 0;
      pointer-events: none; z-index: 0;
    }
    body.t-void #void-bg { display: block; }
    .vstar {
      position: absolute; border-radius: 50%;
      background: #c8dcf0; opacity: 0;
      animation: tw var(--d,4s) ease-in-out infinite var(--dl,0s);
    }
    @keyframes tw { 0%,100%{opacity:0} 50%{opacity:var(--op,.3)} }

    /* ══ CANVAS BG ═════════════════════════════════════ */
    #bg-canvas {
      position: fixed; inset: 0;
      width: 100%; height: 100%;
      z-index: 0; pointer-events: none;
    }

    /* ══ LAYOUT ════════════════════════════════════════ */
    .page-wrap { position: relative; z-index: 1; }

    /* ══ HEADER ════════════════════════════════════════ */
    header {
      position: sticky; top: 0; z-index: 100;
      background: var(--hbg);
      backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--border);
      padding: 0 1.5rem; height: 56px;
      display: flex; align-items: center; justify-content: space-between; gap: .8rem;
    }

    .h-left { display: flex; align-items: center; gap: .7rem; flex-shrink: 0; }

    /* 뒤로가기 버튼 (스토리 뷰에서만 표시) */
    .btn-back {
      background: none; border: 1px solid var(--border);
      color: var(--text-sub); width: 30px; height: 30px; border-radius: 4px;
      cursor: pointer; font-size: .9rem;
      display: none; align-items: center; justify-content: center;
      transition: border-color .2s, color .2s; flex-shrink: 0;
    }
    .btn-back:hover { border-color: var(--text-sub); color: var(--text); }
    body.in-story .btn-back { display: flex; }

    .brand-block {
      display: flex; flex-direction: column;
      gap: .2rem; justify-content: center;
    }
    .site-name {
      font-family: 'Space Mono', monospace;
      font-size: 0.82rem; letter-spacing: 0.04em; color: var(--text);
    }
    body.in-story .site-name { font-size: .65rem; letter-spacing: .1em; color: var(--text-muted); }

    /* SNS 아이콘 */
    .sns-icons { display: flex; align-items: center; gap: .25rem; }
    .sns-link {
      display: flex; align-items: center; justify-content: center;
      width: 20px; height: 20px; border-radius: 3px;
      color: var(--text-muted); opacity: .6;
      transition: opacity .2s, color .2s;
    }
    .sns-link:hover { opacity: 1; color: var(--text); }
    .sns-link svg { width: 11px; height: 11px; fill: currentColor; }

    .h-right { display: flex; align-items: center; gap: .9rem; }

    /* 폰트 크기 조절 (스토리 뷰에서만 표시) */
    .font-ctrl {
      display: none; align-items: center; gap: .1rem;
      border: 1px solid var(--border); border-radius: 4px; padding: 0 .15rem;
    }
    body.in-story .font-ctrl { display: flex; }
    .font-btn {
      background: none; border: none; color: var(--text-muted);
      font-family: 'Space Mono', monospace; font-size: .85rem;
      cursor: pointer; padding: .15rem .45rem; line-height: 1;
      transition: color .2s;
    }
    .font-btn:hover { color: var(--text); }
    .font-val {
      font-family: 'Space Mono', monospace; font-size: .58rem;
      color: var(--text-muted); min-width: 1.6rem; text-align: center;
    }

    /* 테마 동그라미 (index) / 네모 (story) */
    .theme-btns { display: flex; gap: .3rem; align-items: center; }
    .tbtn {
      width: 14px; height: 14px; border-radius: 50%;
      border: 1.5px solid transparent; cursor: pointer;
      transition: border-color .2s, transform .15s;
      outline: 1px solid rgba(0,0,0,.12); outline-offset: 0;
    }
    body.in-story .tbtn { width: 20px; height: 20px; border-radius: 3px; }
    .tbtn:hover { transform: scale(1.2); }
    .tbtn.on { border-color: var(--text); outline-color: transparent; }
    .tbtn-minimal { background: #fafafa; }
    .tbtn-night   { background: #0f0e0c; outline-color: rgba(255,255,255,.15); }
    .tbtn-sepia   { background: #d4b896; outline-color: rgba(0,0,0,.15); }
    .tbtn-void    { background: linear-gradient(135deg,#07080f 50%,#1a2240); outline-color: rgba(94,200,232,.2); }

    /* 관리 링크 */
    .header-nav { display: flex; align-items: center; }
    .header-nav a {
      font-size: .75rem; color: var(--text-muted);
      letter-spacing: .05em; transition: color .2s;
    }
    .header-nav a:hover { color: var(--text); }
    body.in-story .header-nav { display: none; }

    /* ══ LIST VIEW ═════════════════════════════════════ */
    #list-view {}

    .hero {
      max-width: 720px; margin: 0 auto; padding: 7rem 2rem 4.5rem;
    }
    .hero-label {
      font-family: 'Space Mono', monospace;
      font-size: .68rem; letter-spacing: .2em; text-transform: uppercase;
      color: var(--text-muted); margin-bottom: 1.4rem;
    }
    .hero-title {
      font-family: 'Noto Serif KR', serif;
      font-size: clamp(2rem,5vw,3rem); font-weight: 300;
      line-height: 1.3; color: var(--text); margin-bottom: 1.2rem;
    }
    .hero-desc {
      font-size: .88rem; color: var(--text-sub);
      line-height: 1.9; max-width: 460px;
    }

    .works-section { max-width: 720px; margin: 0 auto; padding: 0 2rem 8rem; }
    .section-rule { border: none; border-top: 1px solid var(--border); margin-bottom: 2.5rem; }
    .works-count {
      font-family: 'Space Mono', monospace; font-size: .68rem;
      color: var(--text-muted); letter-spacing: .1em; margin-bottom: 2rem;
    }

    .card-list { display: flex; flex-direction: column; }
    .card {
      display: grid; grid-template-columns: 2.5rem 1fr auto;
      align-items: start; gap: 1.2rem;
      padding: 1.8rem 0; border-bottom: 1px solid var(--border);
      cursor: pointer; transition: opacity .2s; background: transparent;
    }
    .card:first-child { border-top: 1px solid var(--border); }
    .card:hover { opacity: .6; }
    .card-num {
      font-family: 'Space Mono', monospace; font-size: .68rem;
      color: var(--text-muted); padding-top: .25rem;
    }
    .card-meta { display: flex; align-items: center; gap: .6rem; margin-bottom: .45rem; }
    .card-theme-badge {
      font-family: 'Space Mono', monospace; font-size: .6rem;
      letter-spacing: .1em; text-transform: uppercase;
      padding: .15em .55em; border: 1px solid var(--border);
      color: var(--text-muted); border-radius: 2px;
    }
    .card-date { font-family: 'Space Mono', monospace; font-size: .65rem; color: var(--text-muted); }
    .card-title {
      font-family: 'Noto Serif KR', serif;
      font-size: 1.15rem; font-weight: 400;
      color: var(--text); margin-bottom: .3rem; line-height: 1.4;
    }
    .card-subtitle { font-size: .76rem; color: var(--text-muted); margin-bottom: .6rem; }
    .card-excerpt {
      font-size: .83rem; color: var(--text-sub); line-height: 1.75;
      display: -webkit-box; -webkit-line-clamp: 2;
      -webkit-box-orient: vertical; overflow: hidden;
    }
    .card-arrow {
      font-size: .9rem; color: var(--text-muted); padding-top: .25rem;
      transition: transform .2s, color .2s;
    }
    .card:hover .card-arrow { transform: translateX(4px); color: var(--text); }

    .empty-state {
      text-align: center; padding: 4rem 0;
      color: var(--text-muted); font-size: .83rem; line-height: 2;
    }

    footer {
      border-top: 1px solid var(--border); padding: 2rem; text-align: center;
    }
    .footer-inner {
      font-family: 'Space Mono', monospace; font-size: .65rem;
      color: var(--text-muted); letter-spacing: .12em;
    }

    /* ══ STORY VIEW ════════════════════════════════════ */
    #story-view { display: none; }
    body.in-story #story-view { display: block; }
    body.in-story #list-view  { display: none; }

    #story-main {
      max-width: var(--rw); margin: 0 auto;
      padding: 3.5rem 2rem 7rem;
      font-family: var(--font-body);
    }

    /* 작품 헤더 */
    .story-head {
      margin-bottom: 3rem; padding-bottom: 2.5rem;
      border-bottom: 1px solid var(--border);
    }
    .story-label {
      font-family: var(--font-mono); font-size: .6rem;
      letter-spacing: .2em; color: var(--text-muted);
      text-transform: uppercase; margin-bottom: 1rem;
    }
    body.t-void .story-label { color: var(--accent); opacity: .6; }
    .story-title {
      font-family: var(--font-body); font-size: clamp(1.6rem,4.5vw,2.4rem);
      font-weight: 400; line-height: 1.25; color: var(--text);
      margin-bottom: .5rem; letter-spacing: -.01em;
    }
    body.t-void .story-title {
      color: #ddeeff; text-shadow: 0 0 40px rgba(94,200,232,.2);
      font-weight: 300; letter-spacing: .02em;
    }
    body.t-sepia .story-title { font-style: italic; }
    .story-subtitle { font-size: .88rem; color: var(--text-sub); margin-bottom: 1.2rem; letter-spacing: .03em; }
    .story-meta {
      display: flex; flex-wrap: wrap; gap: .8rem 1.5rem;
      font-family: var(--font-mono); font-size: .6rem;
      color: var(--text-muted); letter-spacing: .1em; text-transform: uppercase;
    }
    .meta-item { display: flex; align-items: center; gap: .35rem; }
    .meta-icon { opacity: .6; font-size: .65rem; }

    /* 본문 */
    .story-body {
      font-size: 1rem; line-height: var(--lh);
      letter-spacing: var(--ls); color: var(--text);
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      font-feature-settings: 'kern' 1,'liga' 1,'calt' 1;
      widows: 3; orphans: 3;
    }
    .story-body p { margin-bottom: 1.6rem; }
    .story-body p:last-child { margin-bottom: 0; }

    /* 드롭캡 */
    .story-body .first-para::first-letter {
      font-size: 3em; line-height: .75; float: left;
      margin: .08em .1em 0 0; font-weight: 400; color: var(--text-sub);
    }
    body.t-void .story-body .first-para::first-letter {
      color: var(--accent); text-shadow: 0 0 20px rgba(94,200,232,.4);
    }
    body.t-sepia .story-body .first-para::first-letter { color: #7a4020; font-style: normal; }

    /* 씬 구분 */
    .scene-br {
      border: none; margin: 2.8rem 0;
      display: flex; align-items: center; justify-content: center;
    }
    body.t-minimal .scene-br::before,
    body.t-sepia   .scene-br::before { content: '◇'; font-size: .55rem; color: var(--hr-clr); }
    body.t-night   .scene-br::before {
      content: '— — —'; font-family: var(--font-mono);
      font-size: .65rem; color: var(--text-muted); letter-spacing: .3em;
    }
    body.t-void .scene-br::before {
      content: ''; display: block; width: 80px; height: 1px;
      background: linear-gradient(90deg,transparent,var(--accent),transparent); opacity: .3;
    }

    .story-body em { font-style: italic; color: var(--text-sub); }
    body.t-void .story-body em { font-style: normal; color: var(--accent); opacity: .85; }

    /* 텍스트 선택 */
    body.t-minimal ::selection { background: rgba(28,28,30,.1); }
    body.t-night   ::selection { background: rgba(232,216,184,.2); }
    body.t-sepia   ::selection { background: rgba(122,64,32,.15); color: var(--text); }
    body.t-void    ::selection { background: rgba(94,200,232,.2); }

    /* 오프닝 워즈 */
    .opening-words { letter-spacing: .045em; font-weight: 500; }
    body.t-night .opening-words { font-weight: 400; letter-spacing: .06em; color: var(--text); }
    body.t-sepia .opening-words { font-variant: small-caps; letter-spacing: .07em; font-style: normal; }
    body.t-void  .opening-words { color: var(--text); opacity: .9; letter-spacing: .05em; }

    /* 풀 쿼트 */
    .pull-quote {
      margin: 3rem 0; padding: 2.2rem 2rem;
      text-align: center; font-size: 1.15em; font-style: italic;
      line-height: 1.65; color: var(--text-sub);
      border-top: 1px solid var(--border); border-bottom: 1px solid var(--border);
      position: relative;
    }
    .pull-quote::before {
      content: '\201C'; display: block; font-size: 3rem; line-height: .6;
      color: var(--text-muted); margin-bottom: .8rem;
      font-family: Georgia,serif; font-style: normal;
    }
    body.t-night .pull-quote {
      border-top: none; border-bottom: none;
      border-left: 2px solid rgba(232,216,184,.18);
      border-right: 2px solid rgba(232,216,184,.18);
      text-align: left; padding: 1.4rem 2rem;
    }
    body.t-sepia .pull-quote { font-family: 'IM Fell English',serif; font-size: 1.2em; border-color: var(--hr-clr); }
    body.t-void  .pull-quote {
      border-color: transparent; color: var(--accent); opacity: .8;
      font-style: normal; font-size: 1.08em; letter-spacing: .04em;
    }
    body.t-void  .pull-quote::before { color: var(--accent); opacity: .25; }

    /* 섹션 제목 */
    .section-head {
      font-family: var(--font-mono); font-size: .6rem;
      letter-spacing: .22em; text-transform: uppercase;
      color: var(--text-muted); margin: 3.5rem 0 1.8rem;
      display: flex; align-items: center; gap: 1rem;
      font-weight: 400; font-style: normal;
    }
    .section-head::before,
    .section-head::after { content: ''; flex: 1; height: 1px; background: var(--border); }
    body.t-void .section-head { color: var(--accent); opacity: .45; }
    body.t-void .section-head::before,
    body.t-void .section-head::after { background: linear-gradient(90deg,transparent,var(--accent)); opacity: .2; }

    /* 공유 버튼 */
    .share-row {
      margin-top: 3rem; padding-top: 2rem; border-top: 1px solid var(--border);
      display: flex; align-items: center; gap: .75rem; flex-wrap: wrap;
    }
    .share-label {
      font-family: var(--font-mono); font-size: .6rem;
      color: var(--text-muted); letter-spacing: .12em; text-transform: uppercase;
    }
    .share-btn {
      display: inline-flex; align-items: center; gap: .4rem;
      padding: .4rem .9rem; border: 1px solid var(--border); border-radius: 4px;
      font-family: var(--font-mono); font-size: .65rem; letter-spacing: .06em;
      cursor: pointer; background: transparent; color: var(--text-sub);
      transition: border-color .2s, color .2s;
    }
    .share-btn:hover { border-color: var(--text-sub); color: var(--text); }
    body.t-void .share-btn:hover { border-color: var(--accent); color: var(--accent); }
    .share-btn svg { width: 12px; height: 12px; fill: currentColor; }

    /* 이전/다음 */
    .nav-row { margin-top: 2rem; display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .nav-card {
      padding: 1rem 1.2rem; border: 1px solid var(--border); border-radius: 4px;
      cursor: pointer; transition: border-color .2s;
    }
    .nav-card:hover { border-color: var(--text-muted); }
    body.t-void .nav-card:hover { border-color: var(--accent); }
    .nav-card.next { text-align: right; }
    .nav-dir {
      font-family: var(--font-mono); font-size: .58rem;
      color: var(--text-muted); letter-spacing: .12em;
      text-transform: uppercase; margin-bottom: .4rem;
    }
    .nav-title { font-size: .85rem; color: var(--text-sub); line-height: 1.4; }
    .nav-card.empty { border-color: transparent; pointer-events: none; }

    /* 마무리 */
    .story-foot {
      margin-top: 4rem; padding-top: 2rem;
      border-top: 1px solid var(--border); text-align: center;
    }
    .end-mark {
      font-family: var(--font-mono); font-size: .62rem;
      letter-spacing: .2em; color: var(--text-muted);
      text-transform: uppercase; margin-bottom: 1.8rem;
    }
    body.t-void .end-mark { color: var(--accent); opacity: .35; }
    .btn-list {
      display: inline-flex; align-items: center; gap: .4rem;
      padding: .55rem 1.4rem; border: 1px solid var(--border); border-radius: 4px;
      font-family: var(--font-mono); font-size: .7rem; letter-spacing: .08em;
      cursor: pointer; background: transparent; color: var(--text-sub);
      transition: border-color .2s, color .2s;
    }
    .btn-list:hover { border-color: var(--text-sub); color: var(--text); }
    body.t-void .btn-list:hover { border-color: var(--accent); color: var(--accent); box-shadow: 0 0 10px rgba(94,200,232,.1); }

    .not-found { text-align: center; padding: 6rem 0; }
    .not-found h2 { font-size: 1.3rem; font-weight: 400; color: var(--text-muted); margin-bottom: .8rem; }
    .not-found p { font-size: .85rem; color: var(--text-muted); margin-bottom: 2rem; }

    /* 토스트 */
    .toast {
      position: fixed; bottom: 2rem; left: 50%;
      transform: translateX(-50%) translateY(1rem);
      background: var(--text); color: var(--bg);
      font-family: var(--font-mono); font-size: .7rem; letter-spacing: .06em;
      padding: .6rem 1.4rem; border-radius: 4px;
      opacity: 0; transition: opacity .25s, transform .25s;
      pointer-events: none; z-index: 999; white-space: nowrap;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ══ BGM PLAYER ════════════════════════════════════ */
    .bgm-player {
      position: fixed; bottom: 1.6rem; right: 2rem; z-index: 200;
      width: 300px;
      padding: .5rem .6rem;
      background: var(--hbg);
      backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px);
      border: 1px solid var(--border); border-radius: 10px;
      box-shadow: 0 4px 24px rgba(0,0,0,.12);
    }
    .bgm-player iframe { display: block; border-radius: 4px; }

    /* 밝은 테마 → 플레이어 다크 반전 */
    body.t-minimal .bgm-player {
      background: rgba(20,20,22,0.88);
      border-color: rgba(255,255,255,0.14);
      box-shadow: 0 4px 24px rgba(0,0,0,0.28);
    }

    body.t-minimal .bgm-vol::-moz-range-thumb      { background: rgba(200,200,205,0.85); }

    body.t-sepia .bgm-player {

    body.t-sepia .bgm-vol::-moz-range-thumb      { background: rgba(210,180,120,0.85); }

    /* 어두운 테마 → 대비 테두리 강화 */
    body.t-night .bgm-player {
      border-color: rgba(232,216,184,0.32);
      box-shadow: 0 4px 24px rgba(0,0,0,0.4);
    }
    body.t-void .bgm-player {
      border-color: rgba(94,200,232,0.38);
      box-shadow: 0 4px 24px rgba(94,200,232,0.08), 0 0 0 1px rgba(94,200,232,0.07);
    }
    .bgm-dot {
      width: 5px; height: 5px; border-radius: 50%;
      background: var(--text-muted); flex-shrink: 0; transition: background .3s;
    }
    .bgm-dot.playing {
      background: var(--text-sub);
      animation: bgm-pulse 1.8s ease-in-out infinite;
    }
    @keyframes bgm-pulse {
      0%,100%{ opacity:1; transform:scale(1); }
      50%    { opacity:.4; transform:scale(.7); }
    }
    .bgm-title {
      font-family: 'Space Mono', monospace; font-size: .63rem;
      letter-spacing: .06em; color: var(--text-sub);
      white-space: nowrap; max-width: 140px;
      overflow: hidden; text-overflow: ellipsis; user-select: none;
    }
    .bgm-mute {
      background: none; border: none; cursor: pointer; padding: 0;
      display: flex; align-items: center; justify-content: center;
      color: var(--text-muted); opacity: .7;
      transition: opacity .2s, color .2s; flex-shrink: 0;

    .bgm-mute:hover { opacity: 1; color: var(--text); }

  <script>
  /* ════════════════════════════════════════════════════
     오로라 앰비언트 배경
  ════════════════════════════════════════════════════ */
  (function () {
    const canvas = document.getElementById('bg-canvas');
    const ctx    = canvas.getContext('2d');
    let W, H;
    const mouse  = { x: 0, y: 0 };
    const offset = { x: 0, y: 0 };

    function resize() {
      W = canvas.width  = window.innerWidth;
      H = canvas.height = window.innerHeight;
    }
    function tone() {
      const b = document.body;
      if (b.classList.contains('t-void'))  return '60,115,195';
      if (b.classList.contains('t-night')) return '195,172,140';
      if (b.classList.contains('t-sepia')) return '158,118,72';
      return '95,95,95';
    }
    const POOLS = [
      [0.28,0.20,0.58,0.00,2.10,9e-5,7e-5,0.22,0.17],
      [0.78,0.68,0.50,1.55,0.65,7e-5,1.1e-4,0.17,0.21],
      [0.52,0.90,0.44,3.00,4.20,1.1e-4,8e-5,0.14,0.13],
      [0.12,0.72,0.42,4.50,1.80,8e-5,1.0e-4,0.19,0.15],
      [0.88,0.18,0.40,2.30,3.50,1.0e-4,6.5e-5,0.15,0.19],
    ];
    function step() {
      ctx.clearRect(0,0,W,H);
      const t=Date.now(), c=tone();
      offset.x += ((mouse.x-W/2)*0.028 - offset.x)*0.018;
      offset.y += ((mouse.y-H/2)*0.022 - offset.y)*0.018;
      const D=Math.min(W,H);
      POOLS.forEach(([xR,yR,rR,ph1,ph2,f1,f2,axR,ayR])=>{
        const x=W*xR+Math.sin(t*f1+ph1)*W*axR+offset.x;
        const y=H*yR+Math.sin(t*f2+ph2)*H*ayR+offset.y;
        const r=D*rR*(1+Math.sin(t*4.8e-5)*0.07);
        const g=ctx.createRadialGradient(x,y,0,x,y,r);
        g.addColorStop(0,   `rgba(${c},0.058)`);
        g.addColorStop(0.3, `rgba(${c},0.034)`);
        g.addColorStop(0.65,`rgba(${c},0.012)`);
        g.addColorStop(1,   `rgba(${c},0)`);
        ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2);
        ctx.fillStyle=g; ctx.fill();
      });
      requestAnimationFrame(step);
    }
    window.addEventListener('resize', resize);
    window.addEventListener('mousemove', e=>{ mouse.x=e.clientX; mouse.y=e.clientY; });
    window.addEventListener('touchmove', e=>{ mouse.x=e.touches[0].clientX; mouse.y=e.touches[0].clientY; },{passive:true});
    resize(); step();
  })();

  /* ════════════════════════════════════════════════════
     테마
  ════════════════════════════════════════════════════ */
  const THEMES = ['minimal','night','sepia','void'];

  function setTheme(t) {
    THEMES.forEach(n => document.body.classList.remove('t-'+n));
    document.body.classList.add('t-'+t);
    localStorage.setItem('sc808_theme', t);
    document.querySelectorAll('.tbtn').forEach(b => {
      b.classList.toggle('on', b.classList.contains('tbtn-'+t));
    });
    initVoid();
  }
  (function(){
    const saved = localStorage.getItem('sc808_theme');
    if (saved && THEMES.includes(saved)) setTheme(saved);
  })();

  /* ════════════════════════════════════════════════════
     Void 별
  ════════════════════════════════════════════════════ */
  function initVoid() {
    const bg = document.getElementById('void-bg');
    if (!document.body.classList.contains('t-void')) { bg.innerHTML=''; return; }
    if (bg.children.length > 0) return;
    for (let i=0; i<80; i++) {
      const s = document.createElement('div');
      s.className = 'vstar';
      const sz = 1+Math.random()*1.8;
      s.style.cssText = `width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*100}%;--d:${3+Math.random()*6}s;--op:${.15+Math.random()*.45};animation-delay:${Math.random()*6}s`;
      bg.appendChild(s);
    }
  }

  /* ════════════════════════════════════════════════════
     폰트 크기
  ════════════════════════════════════════════════════ */
  let sz = parseInt(localStorage.getItem('sc808_fsize')||'16');
  function applySize() {
    document.documentElement.style.fontSize = sz+'px';
    document.getElementById('fval').textContent = sz;
    localStorage.setItem('sc808_fsize', sz);
  }
  function changeSize(d) {
    sz = Math.max(12, Math.min(24, sz+d));
    applySize();
  }

  /* ════════════════════════════════════════════════════
     스크롤 진행 바 (스토리 뷰 전용)
  ════════════════════════════════════════════════════ */
  const progressBar = document.getElementById('progress-bar');
  window.addEventListener('scroll', ()=>{
    if (!document.body.classList.contains('in-story')) return;
    const doc = document.documentElement;
    const pct = (doc.scrollTop/(doc.scrollHeight-doc.clientHeight))*100;
    progressBar.style.width = pct+'%';
  });

  /* ════════════════════════════════════════════════════
     리스트 렌더링
  ════════════════════════════════════════════════════ */
  const THEME_LABELS = { minimal:'Minimal', night:'Night', sepia:'Sepia', void:'Void' };

  function renderList() {
    const list    = document.getElementById('card-list');
    const countEl = document.getElementById('works-count');
    let stories = getStories();
    if (!stories || stories.length === 0) {
      list.innerHTML = '<div class="empty-state">아직 올라온 작품이 없습니다.</div>';
      countEl.textContent = '0 works';
      return;
    }
    countEl.textContent = stories.length+' works';
    list.innerHTML = stories.map((s,i) => `
      <article class="card" onclick="showStory('${s.id}')">
        <span class="card-num">${String(i+1).padStart(2,'0')}</span>
        <div class="card-body">
          <div class="card-meta">
            <span class="card-theme-badge">${THEME_LABELS[s.theme]||s.theme}</span>
            ${s.date?`<span class="card-date">${s.date}`:''}
          </div>
          <h2 class="card-title">${s.title}</h2>
          ${s.subtitle?`<p class="card-subtitle">${s.subtitle}</p>`:''}
          <p class="card-excerpt">${s.excerpt||''}</p>
        </div>
        <span class="card-arrow">→</span>
      </article>
    `).join('');
  }

  function getStories() {
    let stories = window.STORIES||[];
    try {
      const s = localStorage.getItem('sc808_stories');
      if (s) stories = JSON.parse(s);
    } catch(e){}
    return stories;
  }

  /* ════════════════════════════════════════════════════
     본문 파싱
  ════════════════════════════════════════════════════ */
  function parse(text) {
    let html=''; let first=true;
    text.split(/\n\n+/).forEach(block=>{
      const t=block.trim(); if(!t) return;
      if(t==='---'){ html+='<hr class="scene-br">'; return; }
      if(t.startsWith('##')){
        html+=`<h3 class="section-head"><span>${t.slice(2).trim()}</span></h3>`; return;
      }
      if(t.startsWith('>>') && t.endsWith('<<')){
        html+=`<blockquote class="pull-quote">${t.slice(2,-2).trim()}</blockquote>`; return;
      }
      let p=t.replace(/\*([^*\n]+)\*/g,'<em>$1</em>').replace(/\n/g,'<br>');
      if(first){
        const words=p.split(' ');
        if(words.length>4) p=`<span class="opening-words">${words.slice(0,3).join(' ')}</span> ${words.slice(3).join(' ')}`;
        html+=`<p class="first-para">${p}</p>`; first=false;
      } else { html+=`<p>${p}</p>`; }
    });
    return html;
  }

  /* ════════════════════════════════════════════════════
     유틸
  ════════════════════════════════════════════════════ */
  function getViewCount(id) {
    const key='sc808_view_'+id;
    const n=(parseInt(localStorage.getItem(key)||'0'))+1;
    localStorage.setItem(key,n); return n;
  }
  function readingTime(text) {
    return Math.ceil(text.replace(/\s+/g,' ').split(' ').length/350);
  }

  let toastTimer;
  function showToast(msg) {
    const el=document.getElementById('toast');
    el.textContent=msg; el.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer=setTimeout(()=>el.classList.remove('show'),2000);
  }
  function copyLink() {
    navigator.clipboard.writeText(location.href).then(()=>showToast('링크 복사됨 ✓'));
  }
  function shareX() {
    const t=encodeURIComponent(document.title+' — soundcode808');
    const u=encodeURIComponent(location.href);
    window.open(`https://twitter.com/intent/tweet?text=${t}&url=${u}`,'_blank');
  }

  /* ════════════════════════════════════════════════════
     SPA 네비게이션
  ════════════════════════════════════════════════════ */
  function showStory(id, pushState=true) {
    const stories = getStories();
    const story   = stories.find(x=>x.id===id);
    if (!story) return;

    /* 테마 적용 (저장값 없으면 작품 테마) */
    if (!localStorage.getItem('sc808_theme')) setTheme(story.theme||'minimal');

    applySize();

    const views = getViewCount(id);
    const mins  = readingTime(story.content||'');
    const idx   = stories.findIndex(x=>x.id===id);
    const prev  = stories[idx-1]||null;
    const next  = stories[idx+1]||null;
    const tLabel= {minimal:'Minimal',night:'Night',sepia:'Sepia',void:'Void'};

    document.getElementById('story-main').innerHTML = `
      <article>
        <div class="story-head">
          <p class="story-label">soundcode808 · fiction</p>
          <h1 class="story-title">${story.title}</h1>
          ${story.subtitle?`<p class="story-subtitle">${story.subtitle}</p>`:''}
          <div class="story-meta">
            <span class="meta-item"><span class="meta-icon">◷</span> ${mins}분</span>
            <span class="meta-item"><span class="meta-icon">◎</span> ${views} views</span>
            <span class="meta-item"><span class="meta-icon">◈</span> ${story.date||'—'}</span>
            <span class="meta-item"><span class="meta-icon">◐</span> ${tLabel[story.theme]||'—'}</span>
          </div>
        </div>

        <div class="story-body">${parse(story.content||'')}</div>

        <div class="share-row">
          <span class="share-label">Share</span>
          <button class="share-btn" onclick="copyLink()">
            <svg viewBox="0 0 24 24"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>
            링크 복사
          </button>
          <button class="share-btn" onclick="shareX()">
            <svg viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.744l7.73-8.835L1.254 2.25H8.08l4.253 5.622 5.912-5.622zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
            X 공유
          </button>
        </div>

        <div class="nav-row">
          ${prev
            ? `<div class="nav-card" onclick="showStory('${prev.id}')">
                <div class="nav-dir">← 이전 작품</div>
                <div class="nav-title">${prev.title}</div>
               </div>`
            : `<div class="nav-card empty"></div>`}
          ${next
            ? `<div class="nav-card next" onclick="showStory('${next.id}')">
                <div class="nav-dir">다음 작품 →</div>
                <div class="nav-title">${next.title}</div>
               </div>`
            : `<div class="nav-card empty"></div>`}
        </div>

        <div class="story-foot">
          <p class="end-mark">— fin —</p>
          <button class="btn-list" onclick="showList()">← 목록으로 돌아가기</button>
        </div>
      </article>
    `;

    /* URL 업데이트 */
    if (pushState) {
      history.pushState({ view:'story', id }, story.title, `?id=${id}`);
    }

    /* 뷰 전환 */
    document.body.classList.add('in-story');
    progressBar.classList.add('active');
    progressBar.style.width = '0%';
    document.title = story.title+' — soundcode808';
    window.scrollTo({ top: 0, behavior: 'instant' });
    initVoid();
  }

  function showList(pushState=true) {
    document.body.classList.remove('in-story');
    progressBar.classList.remove('active');
    document.title = 'soundcode808';

    if (pushState) {
      history.pushState({ view:'list' }, 'soundcode808', location.pathname);
    }

    window.scrollTo({ top: 0, behavior: 'instant' });
    initVoid();
  }

  /* 브라우저 뒤로/앞으로 */
  window.addEventListener('popstate', e => {
    const state = e.state;
    if (state && state.view === 'story') {
      showStory(state.id, false);
    } else {
      showList(false);
    }
  });

  /* 초기 로드: URL에 ?id= 있으면 스토리 뷰로 */
  (function(){
    const id = new URLSearchParams(location.search).get('id');
    if (id) {
      /* pushState 없이 렌더 (이미 URL이 맞음) */
      history.replaceState({ view:'story', id }, '', location.href);
      showStory(id, false);
    } else {
      history.replaceState({ view:'list' }, '', location.href);
    }
  })();

  renderList();

  </script>
</body>
</html>
