<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>관리자 — soundcode808</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400&family=Noto+Sans+KR:wght@300;400;500&family=Space+Mono&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #111113;
      --surface:  #1a1a1e;
      --surface2: #222228;
      --border:   #2e2e36;
      --text:     #e8e8ec;
      --text-sub: #888;
      --text-muted: #444;
      --accent:   #e8e8ec;
      --danger:   #ff5566;
      --radius:   6px;
    }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    a { text-decoration: none; color: inherit; }

    /* ── LOGIN SCREEN ───────────────────────── */
    #login-screen {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .login-box {
      width: 100%;
      max-width: 360px;
    }

    .login-title {
      font-family: 'Space Mono', monospace;
      font-size: 0.75rem;
      letter-spacing: 0.2em;
      color: var(--text-muted);
      margin-bottom: 2.5rem;
      text-transform: uppercase;
    }

    .form-group {
      margin-bottom: 1rem;
    }

    .form-label {
      display: block;
      font-family: 'Space Mono', monospace;
      font-size: 0.62rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 0.5rem;
    }

    .form-input {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.75rem 1rem;
      color: var(--text);
      font-family: 'Space Mono', monospace;
      font-size: 0.82rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .form-input:focus { border-color: #555; }
    .form-input::placeholder { color: var(--text-muted); }

    .login-error {
      font-size: 0.75rem;
      color: var(--danger);
      margin-top: 0.8rem;
      display: none;
    }

    .login-remember {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-top: 0.9rem;
      font-size: 0.72rem;
      color: var(--text-muted);
      cursor: pointer;
      user-select: none;
    }
    .login-remember input { accent-color: var(--text-sub); cursor: pointer; }

    .login-lockout {
      font-size: 0.72rem;
      color: var(--danger);
      margin-top: 0.6rem;
      display: none;
      line-height: 1.6;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 0.75rem 1.5rem;
      border-radius: var(--radius);
      font-family: 'Space Mono', monospace;
      font-size: 0.75rem;
      letter-spacing: 0.08em;
      cursor: pointer;
      border: none;
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.8; }

    .btn-primary {
      background: var(--accent);
      color: #111;
      width: 100%;
      margin-top: 1.2rem;
    }

    .btn-secondary {
      background: var(--surface2);
      color: var(--text-sub);
      border: 1px solid var(--border);
    }

    .btn-danger {
      background: transparent;
      color: var(--danger);
      border: 1px solid var(--danger);
    }

    .btn-sm {
      padding: 0.4rem 0.8rem;
      font-size: 0.68rem;
    }

    /* ── ADMIN SCREEN ───────────────────────── */
    #admin-screen {
      display: none;
      min-height: 100vh;
    }

    /* HEADER */
    .admin-header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(17,17,19,0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .admin-brand {
      font-family: 'Space Mono', monospace;
      font-size: 0.75rem;
      letter-spacing: 0.12em;
      color: var(--text-sub);
    }
    .admin-brand span { color: var(--text); }

    .admin-header-actions {
      display: flex;
      gap: 0.75rem;
      align-items: center;
    }

    /* MAIN LAYOUT */
    .admin-body {
      max-width: 860px;
      margin: 0 auto;
      padding: 2.5rem 2rem 6rem;
    }

    /* SECTION TITLE */
    .section-title {
      font-family: 'Space Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 1.2rem;
    }

    /* WORK LIST */
    .work-list {
      margin-bottom: 3rem;
    }

    .work-item {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 1rem 1.2rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 0.5rem;
      cursor: pointer;
      transition: border-color 0.2s;
    }
    .work-item:hover { border-color: #444; }

    .work-item-num {
      font-family: 'Space Mono', monospace;
      font-size: 0.65rem;
      color: var(--text-muted);
      width: 1.5rem;
      flex-shrink: 0;
    }

    .work-item-info { flex: 1; }

    .work-item-title {
      font-size: 0.9rem;
      color: var(--text);
      margin-bottom: 0.15rem;
    }

    .work-item-meta {
      font-family: 'Space Mono', monospace;
      font-size: 0.62rem;
      color: var(--text-muted);
    }

    .work-item-badge {
      font-family: 'Space Mono', monospace;
      font-size: 0.58rem;
      letter-spacing: 0.1em;
      padding: 0.15em 0.6em;
      border-radius: 2px;
      text-transform: uppercase;
    }
    .badge-minimal { background: #2a2a2a; color: #aaa; }
    .badge-night   { background: #151525; color: #7c7ccc; }
    .badge-sepia   { background: #2a2218; color: #c8a86a; }
    .badge-void    { background: #0a0e1a; color: #5ec8e8; }

    /* EDITOR */
    .editor-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
    }

    .editor-header {
      padding: 1rem 1.5rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .editor-mode-label {
      font-family: 'Space Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.12em;
      color: var(--text-sub);
      text-transform: uppercase;
    }

    .editor-body {
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .editor-row {
      display: grid;
      gap: 1rem;
    }
    .editor-row.col2 { grid-template-columns: 1fr 1fr; }
    .editor-row.col3 { grid-template-columns: 1fr 1fr 1fr; }

    textarea.form-input {
      resize: vertical;
      min-height: 300px;
      line-height: 1.7;
      font-family: 'Noto Serif KR', serif;
      font-size: 0.85rem;
    }

    .theme-selector {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0.5rem;
    }

    .theme-option {
      padding: 0.65rem 0.5rem;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      cursor: pointer;
      text-align: center;
      transition: border-color 0.2s;
    }
    .theme-option:hover { border-color: #555; }
    .theme-option.selected { border-color: var(--accent); }

    .theme-option-name {
      font-family: 'Space Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.08em;
      display: block;
      margin-bottom: 0.3rem;
    }
    .theme-option-preview {
      height: 24px;
      border-radius: 2px;
    }
    .preview-minimal { background: linear-gradient(135deg, #fafafa 50%, #f0f0f0 100%); }
    .preview-night   { background: linear-gradient(135deg, #0a0a12 50%, #12121e 100%); }
    .preview-sepia   { background: linear-gradient(135deg, #f5f0e8 50%, #ede5d6 100%); }
    .preview-void    { background: linear-gradient(135deg, #07080f 40%, #1a2240 100%); }

    .editor-footer {
      padding: 1rem 1.5rem;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 0.75rem;
      justify-content: flex-end;
      position: sticky;
      bottom: 0;
      background: var(--surface);
      border-radius: 0 0 var(--radius) var(--radius);
      z-index: 10;
    }

    /* TOAST */
    .toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%) translateY(2rem);
      background: var(--text);
      color: #111;
      font-family: 'Space Mono', monospace;
      font-size: 0.72rem;
      padding: 0.7rem 1.5rem;
      border-radius: var(--radius);
      opacity: 0;
      transition: opacity 0.3s, transform 0.3s;
      pointer-events: none;
      z-index: 999;
      white-space: nowrap;
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* CODE OUTPUT */
    .code-output {
      display: none;
      margin-top: 1rem;
    }

    .code-block {
      background: #0d0d10;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem;
      font-family: 'Space Mono', monospace;
      font-size: 0.72rem;
      color: #8af;
      line-height: 1.6;
      overflow-x: auto;
      white-space: pre-wrap;
      max-height: 200px;
      overflow-y: auto;
    }
  </style>
</head>
<body>

  <!-- ── LOGIN ──────────────────────────────── -->
  <div id="login-screen">
    <div class="login-box">
      <p class="login-title">soundcode808 · admin</p>

      <div class="form-group">
        <label class="form-label" for="inp-id">ID</label>
        <input class="form-input" id="inp-id" type="text" placeholder="ID" autocomplete="off">
      </div>

      <div class="form-group">
        <label class="form-label" for="inp-pw">Password</label>
        <input class="form-input" id="inp-pw" type="password" placeholder="Password" autocomplete="off">
      </div>

      <p class="login-error"   id="login-error">ID 또는 비밀번호가 올바르지 않습니다.</p>
      <p class="login-lockout" id="login-lockout"></p>

      <label class="login-remember">
        <input type="checkbox" id="chk-remember"> 로그인 상태 유지
      </label>

      <button class="btn btn-primary" id="btn-login" onclick="doLogin()">로그인</button>
    </div>
  </div>

  <!-- ── ADMIN ──────────────────────────────── -->
  <div id="admin-screen">
    <header class="admin-header">
      <span class="admin-brand">soundcode808 &nbsp;<span>/ admin</span></span>
      <div class="admin-header-actions">
        <a href="index.html" class="btn btn-secondary btn-sm">← 사이트 보기</a>
        <button class="btn btn-secondary btn-sm" onclick="doLogout()">로그아웃</button>
      </div>
    </header>

    <div class="admin-body">

      <!-- 작품 목록 -->
      <div class="work-list">
        <p class="section-title">작품 목록</p>
        <div id="work-list-items"></div>
        <button class="btn btn-secondary btn-sm" style="margin-top:0.75rem" onclick="openNewEditor()">+ 새 작품 추가</button>
      </div>

      <!-- 에디터 -->
      <div id="editor-wrap" style="display:none">
        <p class="section-title" id="editor-label">새 작품</p>

        <div class="editor-card">
          <div class="editor-header">
            <span class="editor-mode-label" id="editor-mode-label">New</span>
            <button class="btn btn-secondary btn-sm" onclick="closeEditor()">닫기</button>
          </div>

          <div class="editor-body">

            <!-- 제목 / 부제 -->
            <div class="editor-row col2">
              <div class="form-group" style="margin:0">
                <label class="form-label">제목</label>
                <input class="form-input" id="ed-title" type="text" placeholder="작품 제목">
              </div>
              <div class="form-group" style="margin:0">
                <label class="form-label">부제목 (선택)</label>
                <input class="form-input" id="ed-subtitle" type="text" placeholder="시리즈명, 번호 등">
              </div>
            </div>

            <!-- 날짜 / 저자 -->
            <div class="editor-row col2">
              <div class="form-group" style="margin:0">
                <label class="form-label">날짜</label>
                <input class="form-input" id="ed-date" type="text" placeholder="2026.04.17">
              </div>
              <div class="form-group" style="margin:0">
                <label class="form-label">저자 (작가명)</label>
                <input class="form-input" id="ed-author" type="text" placeholder="soundcode808">
              </div>
            </div>
            <input type="hidden" id="ed-id">

            <!-- 테마 -->
            <div class="form-group" style="margin:0">
              <label class="form-label">테마</label>
              <div class="theme-selector">
                <div class="theme-option selected" data-theme="minimal" onclick="selectTheme(this)">
                  <span class="theme-option-name">Minimal</span>
                  <div class="theme-option-preview preview-minimal"></div>
                </div>
                <div class="theme-option" data-theme="night" onclick="selectTheme(this)">
                  <span class="theme-option-name">Night</span>
                  <div class="theme-option-preview preview-night"></div>
                </div>
                <div class="theme-option" data-theme="sepia" onclick="selectTheme(this)">
                  <span class="theme-option-name">Sepia</span>
                  <div class="theme-option-preview preview-sepia"></div>
                </div>
                <div class="theme-option" data-theme="void" onclick="selectTheme(this)">
                  <span class="theme-option-name">Void</span>
                  <div class="theme-option-preview preview-void"></div>
                </div>
              </div>
            </div>

            <!-- 발췌문 -->
            <div class="form-group" style="margin:0">
              <label class="form-label">발췌문 (목록에 표시될 짧은 소개)</label>
              <input class="form-input" id="ed-excerpt" type="text" placeholder="첫 문장 또는 인상적인 한 줄">
            </div>

            <!-- 본문 -->
            <div class="form-group" style="margin:0">
              <label class="form-label">본문 (텍스트 붙여넣기 — --- 로 장면 구분)</label>
              <textarea class="form-input" id="ed-content" placeholder="여기에 소설 본문을 붙여넣으세요.

장면을 구분할 때는 --- 를 단독 줄로 넣으세요.
*이탤릭* 으로 강조 표현 가능합니다."></textarea>
            </div>

          </div><!-- /editor-body -->

          <div class="editor-footer">
            <button class="btn btn-danger btn-sm" id="btn-delete" onclick="deleteWork()" style="display:none">삭제</button>
            <button class="btn btn-secondary btn-sm" onclick="generateCode()">코드 내보내기</button>
            <button class="btn btn-primary" onclick="saveWork()">저장</button>
          </div>
        </div><!-- /editor-card -->

        <!-- 코드 출력 -->
        <div class="code-output" id="code-output">
          <p class="section-title" style="margin-top:1.5rem">stories.js에 붙여넣을 코드</p>
          <pre class="code-block" id="code-block"></pre>
          <button class="btn btn-secondary btn-sm" style="margin-top:0.75rem" onclick="copyCode()">복사</button>
        </div>

      </div><!-- /editor-wrap -->
    </div><!-- /admin-body -->
  </div><!-- /admin-screen -->

  <div class="toast" id="toast"></div>

  <script src="stories.js"></script>
  <script>
    /* ══════════════════════════════════════════
       보안 설정
       - SHA-256 해시 비교 (평문 노출 방지)
       - 로그인 시도 제한: 5회 실패 → 15분 잠금
       - 세션 타임아웃: 2시간 비활성 → 자동 로그아웃
       - 로그인 상태 유지 (체크박스)
    ══════════════════════════════════════════ */
    const ID_HASH = 'bc8f4c4643994747f7786686d78d35dea17b8ca8494b4a0784900bf65dd2043e';
    const PW_HASH = 'c7401f665f59ed2a1b384b1f0501285675b9ef88b1f52e77491f3c941226d79a';
    const MAX_TRIES   = 5;
    const LOCK_MS     = 15 * 60 * 1000;   // 15분
    const SESSION_MS  = 2  * 60 * 60 * 1000; // 2시간

    let isLoggedIn = false;
    let sessionTimer = null;

    /* SHA-256 (Web Crypto API) */
    async function sha256(str) {
      const buf = await crypto.subtle.digest('SHA-256',
        new TextEncoder().encode(str));
      return Array.from(new Uint8Array(buf))
        .map(b => b.toString(16).padStart(2,'0')).join('');
    }

    /* ── 잠금 상태 확인 ─────────────────────── */
    function isLocked() {
      const lock = parseInt(localStorage.getItem('sc808_lockuntil') || '0');
      return Date.now() < lock;
    }
    function getRemainingLock() {
      const lock = parseInt(localStorage.getItem('sc808_lockuntil') || '0');
      const rem  = Math.ceil((lock - Date.now()) / 60000);
      return rem > 0 ? rem : 0;
    }
    function addFailure() {
      let n = parseInt(localStorage.getItem('sc808_fails') || '0') + 1;
      localStorage.setItem('sc808_fails', n);
      if (n >= MAX_TRIES) {
        localStorage.setItem('sc808_lockuntil', Date.now() + LOCK_MS);
        localStorage.setItem('sc808_fails', '0');
      }
      return n;
    }
    function clearFailures() {
      localStorage.removeItem('sc808_fails');
      localStorage.removeItem('sc808_lockuntil');
    }

    /* ── 세션 타임아웃 ──────────────────────── */
    function resetSessionTimer() {
      clearTimeout(sessionTimer);
      sessionTimer = setTimeout(() => {
        if (isLoggedIn) { doLogout(); showLoginMsg('장시간 미사용으로 자동 로그아웃되었습니다.'); }
      }, SESSION_MS);
      localStorage.setItem('sc808_activity', Date.now());
    }
    ['click','keydown','scroll','mousemove'].forEach(ev =>
      document.addEventListener(ev, () => { if (isLoggedIn) resetSessionTimer(); }, { passive: true })
    );

    /* ── 로그인 ─────────────────────────────── */
    async function doLogin() {
      if (isLocked()) {
        showLockout(`잠금 상태입니다. ${getRemainingLock()}분 후 재시도하세요.`);
        return;
      }

      const id = document.getElementById('inp-id').value.trim();
      const pw = document.getElementById('inp-pw').value;
      const btn = document.getElementById('btn-login');
      btn.disabled = true; btn.textContent = '확인 중…';

      const [hId, hPw] = await Promise.all([sha256(id), sha256(pw)]);
      btn.disabled = false; btn.textContent = '로그인';

      if (hId === ID_HASH && hPw === PW_HASH) {
        clearFailures();
        isLoggedIn = true;
        if (document.getElementById('chk-remember').checked) {
          localStorage.setItem('sc808_admin_auth', '1');
        }
        enterAdmin();
      } else {
        const n = addFailure();
        if (isLocked()) {
          showLockout(`로그인 ${MAX_TRIES}회 실패. 15분간 잠깁니다.`);
        } else {
          document.getElementById('login-error').style.display = 'block';
          document.getElementById('login-error').textContent =
            `ID 또는 비밀번호가 올바르지 않습니다. (${MAX_TRIES - n}회 남음)`;
        }
      }
    }

    function enterAdmin() {
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('admin-screen').style.display = 'block';
      document.getElementById('login-error').style.display = 'none';
      document.getElementById('login-lockout').style.display = 'none';
      resetSessionTimer();
      renderWorkList();
    }

    function showLoginMsg(msg) {
      const el = document.getElementById('login-error');
      el.style.display = 'block'; el.style.color = 'var(--text-muted)';
      el.textContent = msg;
    }
    function showLockout(msg) {
      document.getElementById('login-lockout').style.display = 'block';
      document.getElementById('login-lockout').textContent = msg;
      document.getElementById('login-error').style.display = 'none';
      document.getElementById('btn-login').disabled = true;
      setTimeout(() => {
        document.getElementById('btn-login').disabled = false;
        document.getElementById('login-lockout').style.display = 'none';
      }, getRemainingLock() * 60000);
    }

    /* ── 로그아웃 ───────────────────────────── */
    function doLogout() {
      isLoggedIn = false;
      clearTimeout(sessionTimer);
      localStorage.removeItem('sc808_admin_auth');
      document.getElementById('admin-screen').style.display = 'none';
      document.getElementById('login-screen').style.display = 'flex';
      document.getElementById('inp-id').value = '';
      document.getElementById('inp-pw').value = '';
    }

    /* ── 페이지 로드 시 자동 로그인 ─────────── */
    (function () {
      if (localStorage.getItem('sc808_admin_auth') === '1') {
        isLoggedIn = true;
        enterAdmin();
      }
      if (isLocked()) showLockout(`잠금 상태. ${getRemainingLock()}분 후 재시도하세요.`);
    })();

    document.getElementById('inp-pw').addEventListener('keydown', e => {
      if (e.key === 'Enter') doLogin();
    });

    /* ── 로컬 스토리지 기반 데이터 ─────────────── */
    function getLocalStories() {
      try {
        const saved = localStorage.getItem('sc808_stories');
        if (saved) return JSON.parse(saved);
      } catch(e) {}
      // 기본: stories.js에서 로드된 것
      return window.STORIES ? [...window.STORIES] : [];
    }

    function saveLocalStories(arr) {
      localStorage.setItem('sc808_stories', JSON.stringify(arr));
      // 전역 업데이트
      window.STORIES = arr;
    }

    /* ── 작품 목록 렌더 ──────────────────────── */
    function renderWorkList() {
      const stories = getLocalStories();
      const el = document.getElementById('work-list-items');

      if (!stories.length) {
        el.innerHTML = '<p style="font-size:0.8rem;color:var(--text-muted);padding:1rem 0">작품이 없습니다. 아래에서 추가하세요.</p>';
        return;
      }

      const BADGE = { minimal:'badge-minimal', night:'badge-night', sepia:'badge-sepia', void:'badge-void' };

      el.innerHTML = stories.map((s, i) => `
        <div class="work-item" onclick="openEditEditor(${i})">
          <span class="work-item-num">${String(i+1).padStart(2,'0')}</span>
          <div class="work-item-info">
            <div class="work-item-title">${s.title}${s.subtitle ? ' <small style="color:var(--text-muted)">— ' + s.subtitle + '</small>' : ''}</div>
            <div class="work-item-meta">${s.id} · ${s.date || '—'}</div>
          </div>
          <span class="work-item-badge ${BADGE[s.theme] || 'badge-minimal'}">${s.theme}</span>
        </div>
      `).join('');
    }

    /* ── 유틸 ───────────────────────────────── */
    function todayStr() {
      const d = new Date();
      return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`;
    }

    /* ── 에디터 ──────────────────────────────── */
    let editingIndex = -1;
    let selectedTheme = 'minimal';

    function openNewEditor() {
      editingIndex = -1;
      selectedTheme = 'minimal';
      document.getElementById('editor-label').textContent = '새 작품 추가';
      document.getElementById('editor-mode-label').textContent = 'New';
      document.getElementById('btn-delete').style.display = 'none';
      clearEditor();
      document.getElementById('ed-date').value = todayStr();
      selectThemeByValue('minimal');
      document.getElementById('editor-wrap').style.display = 'block';
      document.getElementById('code-output').style.display = 'none';
      document.getElementById('editor-wrap').scrollIntoView({ behavior: 'smooth' });
    }

    function openEditEditor(idx) {
      const stories = getLocalStories();
      const s = stories[idx];
      editingIndex = idx;
      selectedTheme = s.theme || 'minimal';

      document.getElementById('editor-label').textContent = '작품 수정';
      document.getElementById('editor-mode-label').textContent = 'Edit';
      document.getElementById('btn-delete').style.display = 'inline-flex';

      document.getElementById('ed-title').value    = s.title || '';
      document.getElementById('ed-subtitle').value = s.subtitle || '';
      document.getElementById('ed-date').value     = s.date || '';
      document.getElementById('ed-id').value       = s.id || '';
      document.getElementById('ed-author').value   = s.author || '';
      document.getElementById('ed-excerpt').value  = s.excerpt || '';
      document.getElementById('ed-content').value  = s.content || '';
      selectThemeByValue(selectedTheme);

      document.getElementById('editor-wrap').style.display = 'block';
      document.getElementById('code-output').style.display = 'none';
      document.getElementById('editor-wrap').scrollIntoView({ behavior: 'smooth' });
    }

    function closeEditor() {
      document.getElementById('editor-wrap').style.display = 'none';
    }

    function clearEditor() {
      ['ed-title','ed-subtitle','ed-date','ed-id','ed-author','ed-excerpt','ed-content']
        .forEach(id => document.getElementById(id).value = '');
    }

    function selectTheme(el) {
      document.querySelectorAll('.theme-option').forEach(o => o.classList.remove('selected'));
      el.classList.add('selected');
      selectedTheme = el.dataset.theme;
    }

    function selectThemeByValue(val) {
      document.querySelectorAll('.theme-option').forEach(o => {
        o.classList.toggle('selected', o.dataset.theme === val);
      });
      selectedTheme = val;
    }

    function getEditorData() {
      const title     = document.getElementById('ed-title').value.trim();
      const existingId = document.getElementById('ed-id').value.trim();
      const id        = existingId || title.toLowerCase().replace(/\s+/g, '-').replace(/[^a-z0-9\-가-힣]/g, '');
      return {
        id,
        title,
        subtitle: document.getElementById('ed-subtitle').value.trim(),
        date:     document.getElementById('ed-date').value.trim(),
        author:   document.getElementById('ed-author').value.trim(),
        theme:    selectedTheme,
        excerpt:  document.getElementById('ed-excerpt').value.trim(),
        content:  document.getElementById('ed-content').value.trim(),
      };
    }

    /* ── 본문 붙여넣기 → 제목/부제목 자동감지 ── */
    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('ed-content').addEventListener('paste', function() {
        setTimeout(() => {
          const lines = this.value.split('\n');
          const removeIdx = [];
          let i = 0;

          while (i < lines.length && !lines[i].trim()) i++;

          if (i < lines.length && lines[i].startsWith('# ')) {
            const titleInput = document.getElementById('ed-title');
            if (!titleInput.value.trim()) {
              titleInput.value = lines[i].slice(2).trim();
              removeIdx.push(i);
            }
            i++;
          }

          while (i < lines.length && !lines[i].trim()) i++;

          if (i < lines.length && lines[i].startsWith('## ')) {
            const subInput = document.getElementById('ed-subtitle');
            if (!subInput.value.trim()) {
              subInput.value = lines[i].slice(3).trim();
              removeIdx.push(i);
            }
          }

          if (removeIdx.length) {
            const newLines = lines.filter((_, idx) => !removeIdx.includes(idx));
            while (newLines.length && !newLines[0].trim()) newLines.shift();
            this.value = newLines.join('\n');
          }
        }, 0);
      });
    });

    function saveWork() {
      const data = getEditorData();
      if (!data.title) { showToast('제목을 입력하세요.'); return; }
      if (!data.content) { showToast('본문을 입력하세요.'); return; }

      const stories = getLocalStories();
      if (editingIndex >= 0) {
        stories[editingIndex] = data;
      } else {
        stories.push(data);
      }
      saveLocalStories(stories);
      renderWorkList();
      closeEditor();
      showToast('저장되었습니다. ✓');
    }

    function deleteWork() {
      if (editingIndex < 0) return;
      if (!confirm('삭제하시겠습니까?')) return;
      const stories = getLocalStories();
      stories.splice(editingIndex, 1);
      saveLocalStories(stories);
      renderWorkList();
      closeEditor();
      showToast('삭제되었습니다.');
    }

    /* ── 코드 내보내기 ───────────────────────── */
    function generateCode() {
      const data = getEditorData();
      const escaped = data.content.replace(/`/g, '\\`').replace(/\$/g, '\\$');
      const code =
`  {
    id: '${data.id}',
    title: '${data.title}',
    subtitle: '${data.subtitle}',
    author: '${data.author}',
    theme: '${data.theme}',
    date: '${data.date}',
    excerpt: '${data.excerpt}',
    content: \`${escaped}\`
  },`;

      document.getElementById('code-block').textContent = code;
      document.getElementById('code-output').style.display = 'block';
      showToast('코드가 생성되었습니다.');
    }

    function copyCode() {
      const text = document.getElementById('code-block').textContent;
      navigator.clipboard.writeText(text).then(() => showToast('클립보드에 복사되었습니다. ✓'));
    }

    /* ── 토스트 ──────────────────────────────── */
    let toastTimer;
    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
    }
  </script>
</body>
</html>
