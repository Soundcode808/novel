<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>소설 — soundcode808</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600&family=Noto+Sans+KR:wght@300;400;500&family=Space+Mono:wght@400;700&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ══ THEMES ══════════════════════════════ */
    body.t-minimal {
      --bg:#fafafa; --surface:#fff; --text:#1c1c1e; --text-sub:#6e6e73;
      --text-muted:#b0b0b5; --border:#e8e8ec; --accent:#1c1c1e;
      --hr-clr:#e0e0e5; --font-body:'Noto Serif KR',serif;
      --font-ui:'Noto Sans KR',sans-serif; --font-mono:'Space Mono',monospace;
      --lh:2.05; --ls:0.01em; --w:660px; --hbg:rgba(250,250,250,0.92);
      --progress-clr:#1c1c1e;
    }
    body.t-night {
      --bg:#0f0e0c; --surface:#181714; --text:#e8d8b8; --text-sub:#a09070;
      --text-muted:#5a4e3a; --border:#2a2520; --accent:#e8d8b8;
      --hr-clr:#2e2820; --font-body:'Noto Serif KR',serif;
      --font-ui:'Noto Sans KR',sans-serif; --font-mono:'Space Mono',monospace;
      --lh:2.2; --ls:0.015em; --w:640px; --hbg:rgba(15,14,12,0.94);
      --progress-clr:#e8d8b8;
    }
    body.t-sepia {
      --bg:#f2ead8; --surface:#faf4e8; --text:#3c2f1e; --text-sub:#7a6248;
      --text-muted:#b09a7e; --border:#ddd0bc; --accent:#3c2f1e;
      --hr-clr:#d0bfa8; --font-body:'IM Fell English','Noto Serif KR',serif;
      --font-ui:'Noto Sans KR',sans-serif; --font-mono:'Space Mono',monospace;
      --lh:2.15; --ls:0.02em; --w:620px; --hbg:rgba(242,234,216,0.94);
      --progress-clr:#7a4020;
    }
    body.t-void {
      --bg:#07080f; --surface:#0d0e1c; --text:#c8dcf0; --text-sub:#5a7a9a;
      --text-muted:#2a3a55; --border:#1a2240; --accent:#5ec8e8;
      --hr-clr:#1e2a48; --font-body:'Noto Sans KR',sans-serif;
      --font-ui:'Noto Sans KR',sans-serif; --font-mono:'Space Mono',monospace;
      --lh:2.0; --ls:0.03em; --w:680px; --hbg:rgba(7,8,15,0.95);
      --progress-clr:#5ec8e8;
    }

    /* ══ BASE ════════════════════════════════ */
    html { font-size: 16px; }
    body {
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      transition: background .3s, color .3s;
      overflow-x: hidden;
    }
    a { text-decoration: none; color: inherit; }

    /* ══ VOID 별 ══════════════════════════════ */
    #void-bg {
      display:none; position:fixed; inset:0;
      pointer-events:none; z-index:0;
    }
    body.t-void #void-bg { display:block; }
    .vstar {
      position:absolute; border-radius:50%;
      background:#c8dcf0; opacity:0;
      animation: tw var(--d,4s) ease-in-out infinite var(--dl,0s);
    }
    @keyframes tw { 0%,100%{opacity:0} 50%{opacity:var(--op,.3)} }

    /* ══ SCROLL PROGRESS ═════════════════════ */
    #progress-bar {
      position:fixed; top:0; left:0; z-index:200;
      height:2px; width:0%;
      background: var(--progress-clr);
      transition: width .1s linear;
    }
    body.t-void #progress-bar {
      background: linear-gradient(90deg, #5ec8e8, #7c5cfc);
      box-shadow: 0 0 6px rgba(94,200,232,0.4);
    }

    /* ══ HEADER ══════════════════════════════ */
    .page-wrap { position:relative; z-index:1; }

    header {
      position:sticky; top:0; z-index:100;
      background:var(--hbg);
      backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px);
      border-bottom:1px solid var(--border);
      padding:0 1.5rem; height:54px;
      display:flex; align-items:center; justify-content:space-between; gap:.8rem;
    }

    .h-left { display:flex; align-items:center; gap:.7rem; flex-shrink:0; }

    .brand-block {
      display:flex; flex-direction:column;
      gap:.2rem; justify-content:center;
    }

    .btn-back {
      background:none; border:1px solid var(--border);
      color:var(--text-sub); width:30px; height:30px; border-radius:4px;
      cursor:pointer; font-size:.9rem;
      display:flex; align-items:center; justify-content:center;
      transition:border-color .2s,color .2s;
    }
    .btn-back:hover { border-color:var(--text-sub); color:var(--text); }

    .site-id {
      font-family:var(--font-mono); font-size:.65rem;
      letter-spacing:.1em; color:var(--text-muted);
    }

    /* SNS 아이콘 — 미니멀 */
    .sns-icons {
      display:flex; align-items:center; gap:.25rem;
    }
    .sns-link {
      display:flex; align-items:center; justify-content:center;
      width:20px; height:20px; border-radius:3px;
      color:var(--text-muted); opacity:.6;
      transition:opacity .2s, color .2s;
    }
    .sns-link:hover { opacity:1; color:var(--text); }
    .sns-link svg { width:11px; height:11px; fill:currentColor; }

    .h-right { display:flex; align-items:center; gap:.5rem; }

    /* 폰트 크기 조절 */
    .font-ctrl {
      display:flex; align-items:center; gap:.1rem;
      border:1px solid var(--border); border-radius:4px;
      padding:0 .15rem;
    }
    .font-btn {
      background:none; border:none; color:var(--text-muted);
      font-family:var(--font-mono); font-size:.85rem;
      cursor:pointer; padding:.15rem .45rem; line-height:1;
      transition:color .2s;
    }
    .font-btn:hover { color:var(--text); }
    .font-val {
      font-family:var(--font-mono); font-size:.58rem;
      color:var(--text-muted); min-width:1.6rem; text-align:center;
    }

    /* 테마 버튼 */
    .theme-btns { display:flex; gap:.2rem; }
    .tbtn {
      width:20px; height:20px; border-radius:3px;
      border:1.5px solid transparent;
      cursor:pointer; transition:border-color .2s, transform .15s;
    }
    .tbtn:hover { transform:scale(1.2); }
    .tbtn.on { border-color:var(--text); }
    .tbtn-minimal { background:#fafafa; outline:1px solid #ccc; }
    .tbtn-night   { background:#0f0e0c; outline:1px solid #444; }
    .tbtn-sepia   { background:#d4b896; outline:1px solid #b09060; }
    .tbtn-void    { background:linear-gradient(135deg,#07080f 50%,#1a2240); outline:1px solid #2a3a55; }

    /* ══ MAIN ════════════════════════════════ */
    main {
      max-width:var(--w); margin:0 auto;
      padding:3.5rem 2rem 7rem;
    }

    /* 작품 헤더 */
    .story-head {
      margin-bottom:3rem; padding-bottom:2.5rem;
      border-bottom:1px solid var(--border);
    }
    .story-label {
      font-family:var(--font-mono); font-size:.6rem;
      letter-spacing:.2em; color:var(--text-muted);
      text-transform:uppercase; margin-bottom:1rem;
    }
    body.t-void .story-label { color:var(--accent); opacity:.6; }

    .story-title {
      font-family:var(--font-body); font-size:clamp(1.6rem,4.5vw,2.4rem);
      font-weight:400; line-height:1.25; color:var(--text);
      margin-bottom:.5rem; letter-spacing:-.01em;
    }
    body.t-void .story-title {
      color:#ddeeff; text-shadow:0 0 40px rgba(94,200,232,.2);
      font-weight:300; letter-spacing:.02em;
    }
    body.t-sepia .story-title { font-style:italic; }

    .story-subtitle {
      font-size:.88rem; color:var(--text-sub);
      margin-bottom:1.2rem; letter-spacing:.03em;
    }

    .story-meta {
      display:flex; flex-wrap:wrap; gap:.8rem 1.5rem;
      font-family:var(--font-mono); font-size:.6rem;
      color:var(--text-muted); letter-spacing:.1em; text-transform:uppercase;
    }
    .meta-item { display:flex; align-items:center; gap:.35rem; }
    .meta-icon { opacity:.6; font-size:.65rem; }

    /* ══ BODY ════════════════════════════════ */
    .story-body {
      font-size:1rem; line-height:var(--lh);
      letter-spacing:var(--ls); color:var(--text);
      -webkit-font-smoothing:antialiased;
      text-rendering:optimizeLegibility;
      font-feature-settings:'kern' 1,'liga' 1,'calt' 1;
      widows:3; orphans:3;
    }
    .story-body p { margin-bottom:1.6rem; }
    .story-body p:last-child { margin-bottom:0; }

    /* 첫 글자 */
    .story-body .first-para::first-letter {
      font-size:3em; line-height:.75; float:left;
      margin:.08em .1em 0 0; font-weight:400; color:var(--text-sub);
    }
    body.t-void .story-body .first-para::first-letter {
      color:var(--accent); text-shadow:0 0 20px rgba(94,200,232,.4);
    }
    body.t-sepia .story-body .first-para::first-letter { color:#7a4020; font-style:normal; }

    /* 씬 구분 */
    .scene-br {
      border:none; margin:2.8rem 0;
      display:flex; align-items:center; justify-content:center;
    }
    body.t-minimal .scene-br::before,
    body.t-sepia   .scene-br::before {
      content:'◇'; font-size:.55rem; color:var(--hr-clr);
    }
    body.t-night .scene-br::before {
      content:'— — —'; font-family:var(--font-mono);
      font-size:.65rem; color:var(--text-muted); letter-spacing:.3em;
    }
    body.t-void .scene-br::before {
      content:''; display:block; width:80px; height:1px;
      background:linear-gradient(90deg,transparent,var(--accent),transparent);
      opacity:.3;
    }

    .story-body em { font-style:italic; color:var(--text-sub); }
    body.t-void .story-body em { font-style:normal; color:var(--accent); opacity:.85; }

    /* ══ 텍스트 선택 색상 ═══════════════════════ */
    body.t-minimal ::selection { background:rgba(28,28,30,.1); }
    body.t-night   ::selection { background:rgba(232,216,184,.2); }
    body.t-sepia   ::selection { background:rgba(122,64,32,.15); color:var(--text); }
    body.t-void    ::selection { background:rgba(94,200,232,.2); }

    /* ══ 오프닝 워즈 (첫 문단 도입부) ══════════ */
    .opening-words {
      letter-spacing:.045em; font-weight:500;
    }
    body.t-night .opening-words { font-weight:400; letter-spacing:.06em; color:var(--text); }
    body.t-sepia .opening-words {
      font-variant:small-caps; letter-spacing:.07em; font-style:normal;
    }
    body.t-void  .opening-words { color:var(--text); opacity:.9; letter-spacing:.05em; }

    /* ══ 풀 쿼트 ═══════════════════════════════ */
    .pull-quote {
      margin:3rem 0; padding:2.2rem 2rem;
      text-align:center;
      font-size:1.15em; font-style:italic; line-height:1.65;
      color:var(--text-sub);
      border-top:1px solid var(--border);
      border-bottom:1px solid var(--border);
      position:relative;
    }
    .pull-quote::before {
      content:'\201C';
      display:block; font-size:3rem; line-height:.6;
      color:var(--text-muted); margin-bottom:.8rem;
      font-family:Georgia,serif; font-style:normal;
    }
    body.t-night .pull-quote {
      border-top:none; border-bottom:none;
      border-left:2px solid rgba(232,216,184,.18);
      border-right:2px solid rgba(232,216,184,.18);
      text-align:left; padding:1.4rem 2rem;
    }
    body.t-night .pull-quote::before { color:var(--text-muted); }
    body.t-sepia .pull-quote {
      font-family:'IM Fell English',serif; font-size:1.2em;
      border-color:var(--hr-clr);
    }
    body.t-void  .pull-quote {
      border-color:transparent;
      color:var(--accent); opacity:.8;
      font-style:normal; font-size:1.08em; letter-spacing:.04em;
    }
    body.t-void  .pull-quote::before { color:var(--accent); opacity:.25; }

    /* ══ 섹션 제목 (## 문법) ════════════════════ */
    .section-head {
      font-family:var(--font-mono); font-size:.6rem;
      letter-spacing:.22em; text-transform:uppercase;
      color:var(--text-muted); margin:3.5rem 0 1.8rem;
      display:flex; align-items:center; gap:1rem;
      font-weight:400; font-style:normal;
    }
    .section-head::before,
    .section-head::after { content:''; flex:1; height:1px; background:var(--border); }
    body.t-void .section-head { color:var(--accent); opacity:.45; }
    body.t-void .section-head::before,
    body.t-void .section-head::after {
      background:linear-gradient(90deg,transparent,var(--accent)); opacity:.2;
    }

    /* ══ 공유 버튼 ════════════════════════════ */
    .share-row {
      margin-top:3rem; padding-top:2rem;
      border-top:1px solid var(--border);
      display:flex; align-items:center; gap:.75rem; flex-wrap:wrap;
    }
    .share-label {
      font-family:var(--font-mono); font-size:.6rem;
      color:var(--text-muted); letter-spacing:.12em; text-transform:uppercase;
    }
    .share-btn {
      display:inline-flex; align-items:center; gap:.4rem;
      padding:.4rem .9rem;
      border:1px solid var(--border); border-radius:4px;
      font-family:var(--font-mono); font-size:.65rem;
      letter-spacing:.06em; cursor:pointer;
      background:transparent; color:var(--text-sub);
      transition:border-color .2s, color .2s;
    }
    .share-btn:hover { border-color:var(--text-sub); color:var(--text); }
    body.t-void .share-btn:hover { border-color:var(--accent); color:var(--accent); }
    .share-btn svg { width:12px; height:12px; fill:currentColor; }

    /* ══ PREV / NEXT ══════════════════════════ */
    .nav-row {
      margin-top:2rem;
      display:grid; grid-template-columns:1fr 1fr; gap:1rem;
    }
    .nav-card {
      padding:1rem 1.2rem;
      border:1px solid var(--border); border-radius:4px;
      cursor:pointer; transition:border-color .2s;
    }
    .nav-card:hover { border-color:var(--text-muted); }
    body.t-void .nav-card:hover { border-color:var(--accent); }
    .nav-card.next { text-align:right; }
    .nav-dir {
      font-family:var(--font-mono); font-size:.58rem;
      color:var(--text-muted); letter-spacing:.12em;
      text-transform:uppercase; margin-bottom:.4rem;
    }
    .nav-title {
      font-size:.85rem; color:var(--text-sub); line-height:1.4;
    }
    .nav-card.empty { border-color:transparent; pointer-events:none; }

    /* ══ FOOTER ══════════════════════════════ */
    .story-foot {
      margin-top:4rem; padding-top:2rem;
      border-top:1px solid var(--border); text-align:center;
    }
    .end-mark {
      font-family:var(--font-mono); font-size:.62rem;
      letter-spacing:.2em; color:var(--text-muted);
      text-transform:uppercase; margin-bottom:1.8rem;
    }
    body.t-void .end-mark { color:var(--accent); opacity:.35; }

    .btn-list {
      display:inline-flex; align-items:center; gap:.4rem;
      padding:.55rem 1.4rem;
      border:1px solid var(--border); border-radius:4px;
      font-family:var(--font-mono); font-size:.7rem; letter-spacing:.08em;
      cursor:pointer; background:transparent; color:var(--text-sub);
      transition:border-color .2s, color .2s;
    }
    .btn-list:hover { border-color:var(--text-sub); color:var(--text); }
    body.t-void .btn-list:hover { border-color:var(--accent); color:var(--accent); box-shadow:0 0 10px rgba(94,200,232,.1); }

    /* not found */
    .not-found { text-align:center; padding:6rem 0; }
    .not-found h2 { font-size:1.3rem; font-weight:400; color:var(--text-muted); margin-bottom:.8rem; }
    .not-found p { font-size:.85rem; color:var(--text-muted); margin-bottom:2rem; }
    .not-found a {
      font-family:var(--font-mono); font-size:.75rem; letter-spacing:.08em;
      padding:.5rem 1.2rem; border:1px solid var(--border); border-radius:4px;
      transition:border-color .2s;
    }
    .not-found a:hover { border-color:var(--text-sub); }

    /* copy toast */
    .toast {
      position:fixed; bottom:2rem; left:50%;
      transform:translateX(-50%) translateY(1rem);
      background:var(--text); color:var(--bg);
      font-family:var(--font-mono); font-size:.7rem; letter-spacing:.06em;
      padding:.6rem 1.4rem; border-radius:4px;
      opacity:0; transition:opacity .25s, transform .25s;
      pointer-events:none; z-index:999; white-space:nowrap;
    }
    .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

    @media(max-width:600px){
      main { padding: 2.5rem 1.2rem 6rem; }
      header { padding: 0 .9rem; height: 52px; gap: .5rem; }
      .font-ctrl { display: none; }
      .nav-row { grid-template-columns: 1fr; }
      .story-title { font-size: clamp(1.4rem, 7vw, 1.9rem); }
      .theme-btns { gap: .15rem; }
      .tbtn { width: 18px; height: 18px; }
      .brand-block { gap: .15rem; }
      .site-id { font-size: .58rem; }
      .sns-link { width: 18px; height: 18px; }
      .sns-link svg { width: 10px; height: 10px; }
      .share-row { gap: .5rem; }
      .share-btn { font-size: .6rem; padding: .35rem .7rem; }
    }
  </style>
</head>

  <div id="void-bg"></div>

  <div class="page-wrap">

      <div class="h-left">
        <button class="btn-back" onclick="location.href='index.html'">←</button>
        <div class="brand-block">
          <span class="site-id">soundcode808</span>
          <div class="sns-icons">

            <!-- Instagram -->
            <a class="sns-link" href="https://www.instagram.com/lilika0083" target="_blank" title="Instagram">
              <svg viewBox="0 0 24 24"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"/></svg>
            </a>
            <!-- YouTube -->
            <a class="sns-link" href="https://www.youtube.com/@soundcode606" target="_blank" title="YouTube">
              <svg viewBox="0 0 24 24"><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg>
            </a>
            <!-- SoundCloud -->
            <a class="sns-link" href="https://on.soundcloud.com/flPixldfCcXEYTdcte" target="_blank" title="SoundCloud">
              <svg viewBox="0 0 24 24"><path d="M11.56 8.87V17h8.76c1.85 0 2.68-1.31 2.68-2.56 0-1.19-.82-2.31-2.03-2.51.12-.35.18-.72.18-1.11 0-2.01-1.63-3.63-3.64-3.63-.67 0-1.29.19-1.82.51A4.35 4.35 0 0 0 11.56 8.87zM0 15.24c0 .95.77 1.72 1.72 1.72s1.72-.77 1.72-1.72V12.9c0-.95-.77-1.72-1.72-1.72S0 11.95 0 12.9v2.34zm5.16 1.4c0 .95.77 1.72 1.72 1.72s1.72-.77 1.72-1.72V9.98c0-.95-.77-1.72-1.72-1.72s-1.72.77-1.72 1.72v6.66zm3.44.32c0 .95.77 1.72 1.72 1.72s1.72-.77 1.72-1.72V8.87c0-.95-.77-1.72-1.72-1.72s-1.72.77-1.72 1.72v8.09z"/></svg>

          </div>
        </div>
      </div>

      <div class="h-right">
        <!-- 폰트 크기 -->
        <div class="font-ctrl">
          <button class="font-btn" onclick="changeSize(-1)">−</button>
          <span class="font-val" id="fval">16</span>
          <button class="font-btn" onclick="changeSize(+1)">+</button>
        </div>
        <!-- 테마 -->
        <div class="theme-btns">
          <button class="tbtn tbtn-minimal on" title="Minimal" onclick="setTheme('minimal')"></button>
          <button class="tbtn tbtn-night"       title="Night"   onclick="setTheme('night')"></button>
          <button class="tbtn tbtn-sepia"       title="Sepia"   onclick="setTheme('sepia')"></button>
          <button class="tbtn tbtn-void"        title="Void"    onclick="setTheme('void')"></button>
        </div>
      </div>
    </header>

    <main id="story-main">
      <div class="not-found">
        <h2>작품을 찾을 수 없습니다</h2>
        <p>요청하신 작품이 없거나 주소가 잘못되었습니다.</p>
        <a href="index.html">← 목록으로</a>
      </div>
    </main>
  </div>

  <div class="toast" id="toast"></div>

  <script src="stories.js"></script>
  <script>
    /* ── 테마 ─────────── */
    const THEMES = ['minimal','night','sepia','void'];
    let cur = localStorage.getItem('sc808_theme') || 'minimal';

    function setTheme(t) {
      THEMES.forEach(x => document.body.classList.remove('t-'+x));
      document.body.classList.add('t-'+t);
      document.querySelectorAll('.tbtn').forEach(b => b.classList.remove('on'));
      document.querySelector('.tbtn-'+t).classList.add('on');
      cur = t;
      localStorage.setItem('sc808_theme', t);
      initVoid();
    }

    /* ── 폰트 크기 ────── */
    let sz = parseInt(localStorage.getItem('sc808_fsize')||'16');
    function applySize() {
      document.documentElement.style.fontSize = sz + 'px';
      document.getElementById('fval').textContent = sz;
      localStorage.setItem('sc808_fsize', sz);
    }
    function changeSize(d) {
      sz = Math.max(12, Math.min(24, sz + d));
      applySize();
    }

    /* ── Void 별 ──────── */
    function initVoid() {
      const bg = document.getElementById('void-bg');
      if (!document.body.classList.contains('t-void')) { bg.innerHTML=''; return; }
      if (bg.children.length > 0) return;
      for (let i=0; i<80; i++) {
        const s = document.createElement('div');
        s.className = 'vstar';
        const sz2 = 1 + Math.random()*1.8;
        s.style.cssText = `width:${sz2}px;height:${sz2}px;left:${Math.random()*100}%;top:${Math.random()*100}%;--d:${3+Math.random()*6}s;--op:${.15+Math.random()*.45};animation-delay:${Math.random()*6}s`;
        bg.appendChild(s);
      }
    }

    /* ── 스크롤 진행 바 ── */
    window.addEventListener('scroll', () => {
      const doc = document.documentElement;
      const pct = (doc.scrollTop / (doc.scrollHeight - doc.clientHeight)) * 100;
      document.getElementById('progress-bar').style.width = pct + '%';
    });

    /* ── 조회수 (로컬) ─── */
    function getViewCount(id) {
      const key = 'sc808_view_'+id;
      const n = (parseInt(localStorage.getItem(key)||'0')) + 1;
      localStorage.setItem(key, n);
      return n;
    }

    /* ── 읽기 시간 계산 ─ */
    function readingTime(text) {
      const words = text.replace(/\s+/g,' ').split(' ').length;
      const min = Math.ceil(words / 350);
      return min;
    }

    /* ── 공유 ─────────── */
    function copyLink() {
      navigator.clipboard.writeText(location.href).then(() => showToast('링크 복사됨 ✓'));
    }
    function shareX() {
      const t = encodeURIComponent(document.title + ' — soundcode808');
      const u = encodeURIComponent(location.href);
      window.open(`https://twitter.com/intent/tweet?text=${t}&url=${u}`, '_blank');
    }

    /* ── 토스트 ──────── */
    let tt;
    function showToast(msg) {
      const el = document.getElementById('toast');
      el.textContent = msg; el.classList.add('show');
      clearTimeout(tt);
      tt = setTimeout(() => el.classList.remove('show'), 2000);
    }

    /* ── 본문 파싱 ────── */
    function parse(text) {
      let html = ''; let first = true;
      text.split(/\n\n+/).forEach(block => {
        const t = block.trim();
        if (!t) return;

        // 씬 구분
        if (t === '---') { html += '<hr class="scene-br">'; return; }

        // 섹션 제목: ## 제목
        if (t.startsWith('##')) {
          const h = t.slice(2).trim();
          html += `<h3 class="section-head"><span>${h}</span></h3>`;
          return;
        }

        // 풀 쿼트: >>인용문<<
        if (t.startsWith('>>') && t.endsWith('<<')) {
          const q = t.slice(2, -2).trim();
          html += `<blockquote class="pull-quote">${q}</blockquote>`;
          return;
        }

        // 인라인 서식
        let p = t.replace(/\*([^*\n]+)\*/g, '<em>$1</em>').replace(/\n/g,'<br>');

        if (first) {
          // 첫 문단 — 앞 3단어를 opening-words로 감싸기
          const words = p.split(' ');
          if (words.length > 4) {
            const open = words.slice(0, 3).join(' ');
            const rest = words.slice(3).join(' ');
            p = `<span class="opening-words">${open}</span> ${rest}`;
          }
          html += `<p class="first-para">${p}</p>`;
          first = false;
        } else {
          html += `<p>${p}</p>`;
        }
      });
      return html;
    }

    /* ── 메인 ─────────── */
    function loadStory() {
      const id = new URLSearchParams(location.search).get('id');
      if (!id) return;

      let stories = window.STORIES || [];
      try { const s = localStorage.getItem('sc808_stories'); if(s) stories = JSON.parse(s); } catch(e){}

      const story = stories.find(x => x.id === id);
      if (!story) return;

      if (!localStorage.getItem('sc808_theme')) cur = story.theme || 'minimal';
      setTheme(cur); applySize();

      document.title = story.title + ' — soundcode808';

      const views = getViewCount(id);
      const mins  = readingTime(story.content || '');
      const idx   = stories.findIndex(x => x.id === id);
      const prev  = stories[idx - 1] || null;
      const next  = stories[idx + 1] || null;

      const tLabel = {minimal:'Minimal',night:'Night',sepia:'Sepia',void:'Void'};

      document.getElementById('story-main').innerHTML = `
        <article>
          <div class="story-head">
            <p class="story-label">soundcode808 · fiction</p>
            <h1 class="story-title">${story.title}</h1>
            ${story.subtitle ? `<p class="story-subtitle">${story.subtitle}</p>` : ''}
            <div class="story-meta">
              <span class="meta-item"><span class="meta-icon">◷</span> ${mins}분</span>
              <span class="meta-item"><span class="meta-icon">◎</span> ${views} views</span>
              <span class="meta-item"><span class="meta-icon">◈</span> ${story.date||'—'}</span>
              <span class="meta-item"><span class="meta-icon">◐</span> ${tLabel[story.theme]||'—'}</span>
            </div>
          </div>

          <div class="story-body">${parse(story.content||'')}</div>

          <div class="share-row">
            <span class="share-label">Share</span>
            <button class="share-btn" onclick="copyLink()">
              <svg viewBox="0 0 24 24"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>
              링크 복사
            </button>
            <button class="share-btn" onclick="shareX()">
              <svg viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.744l7.73-8.835L1.254 2.25H8.08l4.253 5.622 5.912-5.622zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
              X 공유
            </button>
          </div>

          <div class="nav-row">
            ${prev
              ? `<div class="nav-card" onclick="location.href='story.html?id=${prev.id}'">
                  <div class="nav-dir">← 이전 작품</div>
                  <div class="nav-title">${prev.title}</div>
                </div>`
              : `<div class="nav-card empty"></div>`
            }
            ${next
              ? `<div class="nav-card next" onclick="location.href='story.html?id=${next.id}'">
                  <div class="nav-dir">다음 작품 →</div>
                  <div class="nav-title">${next.title}</div>
                </div>`
              : `<div class="nav-card empty"></div>`
            }
          </div>

          <div class="story-foot">
            <p class="end-mark">— fin —</p>
            <button class="btn-list" onclick="location.href='index.html'">← 목록으로 돌아가기</button>
          </div>
        </article>
      `;
    }

    setTheme(cur); applySize(); loadStory();
  </script>
</body>
</html>
